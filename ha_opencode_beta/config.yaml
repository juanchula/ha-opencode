---
name: "OpenCode Beta"
description: "AI coding agent for editing Home Assistant configuration with deep MCP integration and LSP support"
version: "10.0.0-beta"
slug: "ha_opencode"
image: "ghcr.io/juanchula/ha-opencode/{arch}"
url: "https://github.com/juanchula/ha-opencode"
arch:
  - aarch64
  - amd64
startup: application
init: false

# Ingress configuration
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot-outline
panel_title: OpenCode Beta

# File access - Home Assistant config directory
map:
  - type: homeassistant_config
    read_only: false

# API access - needed for logs, addon discovery, and ingress session creation
hassio_api: true
hassio_role: manager
homeassistant_api: true

# Security - keep permissions minimal
host_network: false
privileged: []
apparmor: true

# User-configurable options
options:
  # Feature toggles
  mcp_enabled: true
  lsp_enabled: true
  
  # CPU mode: auto (detect), baseline (for older CPUs), regular (force AVX2)
  cpu_mode: "auto"
  
  # Terminal appearance
  terminal_theme: "breeze"
  font_size: 14
  cursor_style: "block"
  cursor_blink: false
  
  # Screenshot tool: enables visual verification of dashboards and UI changes.
  # Requires a Long-Lived Access Token (below) to authenticate with the HA frontend.
  screenshot_enabled: false

  # Long-lived access token for direct HA Core API access.
  # Required for ESPHome ingress and screenshot tool (create at: Profile → Long-Lived Access Tokens).
  # Leave empty if you don't use ESPHome or screenshot tools.
  access_token: ""

  # Zigbee2MQTT configuration (optional — only needed for zigporter Z2M commands)
  # Set your Z2M ingress URL to enable list-z2m, network-map --backend z2m, etc.
  z2m_url: ""
  z2m_mqtt_topic: "zigbee2mqtt"

  # Environment variables to inject into the container
  env_vars: []
  
  # Advanced: custom OpenCode configuration (JSON)
  opencode_config: ""

schema:
  # Feature toggles
  mcp_enabled: bool
  lsp_enabled: bool
  
  # CPU mode
  cpu_mode: list(auto|baseline|regular)
  
  # Terminal appearance
  terminal_theme: list(breeze|catppuccin_mocha|catppuccin_latte|dracula|nord|tokyo_night|one_dark|solarized_dark|solarized_light|gruvbox_dark)
  font_size: int(10,24)
  cursor_style: list(block|underline|bar)
  cursor_blink: bool

  # Screenshot tool
  screenshot_enabled: bool

  # HA Core access token
  access_token: str?
  
  # Zigbee2MQTT (optional)
  z2m_url: str?
  z2m_mqtt_topic: str?

  # Environment variables
  screenshot_enabled: bool
  access_token: str?
  z2m_url: str?
  z2m_mqtt_topic: str?
  hacs_enabled: bool
  grafana_enabled: bool
  grafana_url: str?
  nodered_enabled: bool
  nodered_url: str?
  influxdb_enabled: bool
  influxdb_url: str?
  frigate_enabled: bool
  frigate_url: str?
  music_assistant_enabled: bool
  music_assistant_url: str?
  addon_manager_enabled: bool
  backup_manager_enabled: bool
  env_vars:
    - name: str
      value: str
  opencode_config: str?

# Exclude caches from backups
backup_exclude:
  - ".npm/*"
  - ".cache/*"
  - ".local/share/opencode/cache/*"
  - ".env_vars"
