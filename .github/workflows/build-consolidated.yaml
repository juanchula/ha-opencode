name: Build MCP & LSP Server
run-name: "Build ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }} (${{ matrix.channel }} ${{ matrix.arch }})"

on:
  push:
    tags:
      - 'v*'
      - 'beta-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 1.1.0 or 1.7.0b1)'
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build ${{ matrix.arch }} (${{ matrix.channel }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: stable
            arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base-debian:trixie
            image_repo: ha_opencode
            version_prefix: v
            title: OpenCode
            description: AI coding agent for Home Assistant
          - channel: stable
            arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base-debian:trixie
            image_repo: ha_opencode
            version_prefix: v
            title: OpenCode
            description: AI coding agent for Home Assistant
          - channel: beta
            arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/home-assistant/amd64-base-debian:trixie
            image_repo: ha_opencode_beta
            version_prefix: beta-v
            title: OpenCode Beta
            description: Beta channel for OpenCode - AI coding agent for Home Assistant
            io_hass_name: OpenCode Beta
          - channel: beta
            arch: aarch64
            platform: linux/arm64
            base_image: ghcr.io/home-assistant/aarch64-base-debian:trixie
            image_repo: ha_opencode_beta
            version_prefix: beta-v
            title: OpenCode Beta
            description: Beta channel for OpenCode - AI coding agent for Home Assistant
            io_hass_name: OpenCode Beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#${{ matrix.version_prefix }}}}"
          else
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#${{ matrix.version_prefix }}}}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ha_opencode
          file: ha_opencode/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_repo }}/${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_repo }}/${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_ARCH=${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Unlicense
            ${{ matrix.io_hass_name && 'io.hass.name=' + matrix.io_hass_name || '' }}

