name: MCP & LSP Test Suite

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        - suite: ha-mcp-server
          server_dir: /opt/ha-mcp-server
        - suite: ha-lsp-server
          server_dir: /opt/ha-lsp-server
    steps:
      - uses: actions/checkout@v4
        with:
          repository: 'juanchula/domotica'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.server_dir }}/package.json
      - run: |
          docker build \
            -f ha_opencode/Dockerfile \
            --build-arg BUILD_VERSION=test \
            --build-arg BUILD_ARCH=amd64 \
            -t opencode-test \
            ha_opencode/
        shell: bash
      - run: |
          docker run --rm \
            -v $(pwd)/${{ matrix.server_dir }}:/opt/${{ matrix.server_dir }} \
            -w /opt/${{ matrix.server_dir }} \
            opencode-test \
            npm install && npm test
        shell: bash
